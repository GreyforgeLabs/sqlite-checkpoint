name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Protected release tag to publish. Must be on main and match project.version, e.g. v0.1.0."
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-pypi-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.validate-release.outputs.release_tag }}
      project_version: ${{ steps.validate-release.outputs.project_version }}
    steps:
      - name: Validate release tag input
        id: validate-input
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9A-Za-z]+)*([._+-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag must look like v0.1.0 and must not contain branch, path, or SHA syntax."
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.validate-input.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate release tag target and version
        id: validate-release
        env:
          RELEASE_TAG: ${{ steps.validate-input.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch --force origin \
            "refs/heads/main:refs/remotes/origin/main" \
            "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

          TAG_SHA="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          HEAD_SHA="$(git rev-parse HEAD)"

          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "Checked-out commit $HEAD_SHA does not match ${RELEASE_TAG} target $TAG_SHA."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$TAG_SHA" refs/remotes/origin/main; then
            echo "Release tag ${RELEASE_TAG} must point to a commit already merged to main."
            exit 1
          fi

          PROJECT_VERSION="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              data = tomllib.load(handle)

          print(data["project"]["version"])
          PY
          )"
          EXPECTED_TAG="v${PROJECT_VERSION}"

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag ${RELEASE_TAG} does not match project.version ${PROJECT_VERSION}."
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: dist-${{ steps.validate-release.outputs.release_tag }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish release artifacts to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/sqlite-checkpoint
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          name: dist-${{ needs.build.outputs.release_tag }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
