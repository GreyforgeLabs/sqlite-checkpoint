name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the fields below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you expected vs what actually happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, language version, tool version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12
        - Tool version: v1.0.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or logs.
      render: shell
    validations:
      required: false
